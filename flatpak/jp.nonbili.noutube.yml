app-id: jp.nonbili.noutube-dev
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
command: run.sh
separate-locales: false
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=network
  - --own-name=org.mpris.MediaPlayer2.chromium.*
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.FileManager1
modules:
  - name: noutube
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin:/run/build/noutube/bin
      env:
        VITE_BUILD_TARGET: portable
    build-commands:
      - bun run bundle
      - |
        cd desktop
        bun electron-vite build
        bun electron-builder --dir --publish never --config.electronDist=../node_modules/electron/dist2
        cp -a dist/linux*unpacked /app/main

      - install -Dm755 -t /app/bin/ ./run.sh

      # Prepare dev metadata with correct app-id
      - |
        sed 's/jp.nonbili.noutube/jp.nonbili.noutube-dev/g' metadata/flatpak/jp.nonbili.noutube.metainfo.xml > jp.nonbili.noutube-dev.metainfo.xml
        sed 's/Icon=jp.nonbili.noutube/Icon=jp.nonbili.noutube-dev/g' metadata/flatpak/jp.nonbili.noutube.desktop > jp.nonbili.noutube-dev.desktop
        install -Dm644 jp.nonbili.noutube-dev.metainfo.xml /app/share/metainfo/jp.nonbili.noutube-dev.metainfo.xml
        install -Dm644 jp.nonbili.noutube-dev.desktop /app/share/applications/jp.nonbili.noutube-dev.desktop
        install -Dm644 desktop/icon.png /app/share/icons/hicolor/512x512/apps/jp.nonbili.noutube-dev.png

    sources:
      - type: dir
        path: ..

      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.1/bun-linux-x64.zip
        sha256: 400824c82bfcc0854365bcada11cf53d7384ecb1e2c3da0e2c0a2c6a527d5629
        dest: bin
        only-arches: [x86_64]

      - type: archive
        url: https://github.com/electron/electron/releases/download/v39.2.7/electron-v39.2.7-linux-x64.zip
        sha256: 2f5285ef563dca154aa247696dddef545d3d895dd9b227ed423ea0d43737c22c
        strip-components: 0
        dest: node_modules/electron/dist2
        only-arches: [x86_64]

      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.1/bun-linux-aarch64.zip
        sha256: 65666a18439e891e5751b666103fe591a8519f11b66ec4bd8654c5515d4fff8a
        dest: bin
        only-arches: [aarch64]

      - type: archive
        url: https://github.com/electron/electron/releases/download/v39.2.7/electron-v39.2.7-linux-arm64.zip
        sha256: 445465a43bd2ffaec09877f4ed46385065632a4683c2806cc6211cc73c110024
        strip-components: 0
        dest: node_modules/electron/dist2
        only-arches: [aarch64]

      - type: script
        dest-filename: run.sh
        commands:
          - zypak-wrapper.sh /app/main/NouTube "$@"
